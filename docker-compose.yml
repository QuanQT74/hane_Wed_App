version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: hane-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: hane_db
      MYSQL_USER: root_base
      MYSQL_PASSWORD: 123456
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hane-network

volumes:
  mysql_data:

networks:
  hane-network:
    driver: bridge
